; nidmi-player : lecteur MIDI (.mid) via nidmi-core

[platformio]
default_envs = seeed_xiao_esp32s3

[env]
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; Dimensions reduites du sequenceur pour tenir dans la DRAM ESP32 (~300 Ko).
; Defauts natifs (16 rows / 64 pas / 4 mesures / 16 patterns) => engine ~1,9 Mo.
; Valeurs ci-dessous => engine ~55 Ko (mesure via scratchpad sizes.cpp).
build_flags =
  -DNIDMI_SEQ_MAX_ROWS=8
  -DNIDMI_SEQ_MAX_STEPS=32
  -DNIDMI_SEQ_MAX_BARS=2
  -DNIDMI_SEQ_MAX_PATTERNS=4
  -DNIDMI_SEQ_MAX_SUBPATTERNS=8
  -DNIDMI_SEQ_MAX_CCLOCKS_PER_STEP=2
extra_scripts =
  pre:${PROJECT_DIR}/../nidmi-core/scripts/pio_osc_disable_bluetooth_slip.py
; nidmi-core / nidmi-sequencer-core : depots freres declares en vraies libs
; (symlink://) pour que leurs library.json s'appliquent (deps, libArchive...).
; NB: lib_extra_dirs pointait DANS les depots -> PlatformIO prenait src/ comme
; pseudo-lib sans manifeste et ignorait library.json.
lib_deps =
  symlink://${PROJECT_DIR}/../nidmi-core
  symlink://${PROJECT_DIR}/../nidmi-sequencer-core
  fortyseveneffects/MIDI Library@5.0.2
  AppleMIDI
  cnmat/OSC@1.0.0
  bblanchon/ArduinoJson@^7

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
; console USB (CDC) : ne pas toucher DTR/RTS a l'ouverture du moniteur,
; sinon reset (voire mode download) via USB-Serial/JTAG.
monitor_dtr = 0
monitor_rts = 0

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
